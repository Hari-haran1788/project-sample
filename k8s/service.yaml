apiVersion: v1
kind: Service
metadata:
  name: student-management-system
  namespace: student-system
  labels:
    app: student-management-system
spec:
  type: LoadBalancer
  selector:
    app: student-management-system
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  sessionAffinity: None
  
---
apiVersion: v1
kind: Service
metadata:
  name: student-management-system-headless
  namespace: student-system
  labels:
    app: student-management-system
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: student-management-system
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP