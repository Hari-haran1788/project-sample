apiVersion: v1
kind: Service
metadata:
  name: student-management-system-metrics
  namespace: student-system
  labels:
    app: student-management-system
spec:
  ports:
  - name: metrics
    port: 8000
    targetPort: 8000
  selector:
    app: student-management-system

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: student-management-system
  namespace: student-system
  labels:
    app: student-management-system
spec:
  selector:
    matchLabels:
      app: student-management-system
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics