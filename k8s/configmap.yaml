apiVersion: v1
kind: ConfigMap
metadata:
  name: student-system-config
  namespace: student-system
  labels:
    app: student-management-system
data:
  app.config: |
    [DEFAULT]
    LOG_LEVEL=INFO
    WORKERS=4
    TIMEOUT=60
  
  nginx.conf: |
    upstream flask_app {
      server student-management-system:5000;
    }
    
    server {
      listen 80;
      server_name _;
      
      location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }