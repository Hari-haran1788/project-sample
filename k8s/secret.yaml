apiVersion: v1
kind: Secret
metadata:
  name: student-system-secrets
  namespace: student-system
  labels:
    app: student-management-system
type: Opaque
stringData:
  database-url: "sqlite:////tmp/students.db"
  secret-key: "your-secret-key-change-in-production"

---
apiVersion: v1
kind: Secret
metadata:
  name: student-system-db-secret
  namespace: student-system
  labels:
    app: student-management-system
type: Opaque
stringData:
  db-username: "student_user"
  db-password: "student_password_123"
  db-host: "postgres-service"
  db-port: "5432"
  db-name: "student_management"