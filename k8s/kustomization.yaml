apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: student-system

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml

commonLabels:
  app: student-management-system
  version: v1
  managed-by: kustomize

commonAnnotations:
  description: "Student Management System"
  maintainer: "DevOps Team"

images:
  - name: student-management-system
    newTag: latest

replicas:
  - name: student-management-system
    count: 3