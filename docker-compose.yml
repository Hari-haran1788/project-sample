version: '3.9'

services:
  web:
    build: .
    container_name: student-management-system
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: sqlite:///students.db
      SECRET_KEY: dev-secret-key
    volumes:
      - ./:/app
    depends_on:
      - db
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: student-db
    environment:
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: student_password_123
      POSTGRES_DB: student_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - student-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_user -d student_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: student-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - student-network

volumes:
  postgres_data:
    driver: local

networks:
  student-network:
    driver: bridge
